<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <style></style>
  <body class="h-screen w-full bg-black text-white" style="overflow-x: hidden">
    <div class="h-[95vh] w-full relative">
      <div
        class="w-20 h-20 bg-gray-500 rounded-full absolute bottom-[10px] mx-auto left-[50%] shadow"
        style="transform: rotateX(120deg) translate(-50%)"
      ></div>
      <div
        class="bg-red-800 w-20 h-20 rounded-full absolute bottom-[30px] mx-auto left-[50%] ball"
        style="transform: translate(-50%)"
      ></div>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
      integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"
      integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script>
      gsap.to(".ball", {
        bottom: 200,
        duration: 1,
        yoyo: true,
        repeat: -1,
      });
      gsap.to(".shadow", {
        scale: 0.7,
        opacity: 0.7,
        duration: 1,
        yoyo: true,
        repeat: -1,
      });
    </script>
  </body>
</html>
