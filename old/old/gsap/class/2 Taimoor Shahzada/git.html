<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/ScrollTrigger.min.js"></script>
    <style>
      /** @format */
      * {
        margin: 0;
        padding: 0;
      }
      ::-webkit-scrollbar {
        display: none;
      }
      body {
        overflow-x: hidden;
        font-family: "Neutral Face";
        text-transform: uppercase;
        background-color: red;
        color: black;
      }

      .upper-container {
        position: fixed;
        width: 100%;
        height: 100vh;
        justify-content: center;
        flex-direction: column;
        font-weight: lighter;
        display: flex;
      }

      .upper-container span,
      .upper-container h1 {
        padding: 10px 50px;
      }

      .upper-container span {
        font-size: 20px;
      }

      .upper-container h1 {
        font-size: 80px;
        line-height: 1;
      }

      .imageBoard {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
        overflow: hidden;
      }

      .imageBoard .cardImage {
        opacity: 0;
        height: 50vh;
      }

      .scaleableImg {
        position: absolute;
        width: 250px;
      }

      #scaleableImg1 {
        top: 10%;
        left: 9%;
      }

      #scaleableImg2 {
        top: 35%;
        left: 30%;
      }
      #scaleableImg3 {
        top: 60%;
        left: 15%;
      }
      #scaleableImg4 {
        top: 60%;
        left: 70%;
      }
      #scaleableImg5 {
        top: 30%;
        left: 55%;
      }

      .cardImage {
        position: absolute;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: black;
        font-weight: bold;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="upper-container">
      <span>(OUR AWARDS)</span>
      <h1>
        NOT FOR OUR EGOS, BUT BECAUSE AWARDS ARE A MEASURE OF CREATIVITY,
        ORIGINALITY AND QUALITY. AIMING FOR AWARDS PUSHES US TO THINK DEEPER, GO
        FURTHER AND HAVE MEANINGFUL CONVERSATIONS ABOUT WHAT CREATIVITY IS.
      </h1>
    </div>
    <div class="imageBoard">
      <img src="/img1.png" alt="" id="scaleableImg1" class="scaleableImg" /><img
        src="/img2.png"
        alt=""
        id="scaleableImg2"
        class="scaleableImg"
      /><img
        src="/img3.png"
        alt=""
        id="scaleableImg3"
        class="scaleableImg"
      /><img
        src="/img4.png"
        alt=""
        id="scaleableImg4"
        class="scaleableImg"
      /><img src="/img5.png" alt="" id="scaleableImg5" class="scaleableImg" />
      <div class="cardImage">WE PLAY TO WIN</div>
    </div>
    <script>
      /** @format */
      gsap.registerPlugin(ScrollTrigger);
      gsap
        .timeline({
          scrollTrigger: {
            trigger: ".imageBoard",
            pin: true,
            start: "top top",
            end: "+=300%",
            scrub: 1,
          },
          defaults: {
            ease: "none",
          },
        })
        .to(
          document.body,
          {
            delay: 0.3,
            backgroundColor: "#f0f0f0",
          },
          "start",
        )
        .to(
          ".upper-container h1",
          {
            scale: 5,
          },
          "start",
        )
        .to(
          ".upper-container h1",
          {
            opacity: 0,
          },
          "start",
        )
        .to(
          "#scaleableImg1",
          {
            scale: 10,
            x: -1500,
          },
          "start",
        )
        .to(
          "#scaleableImg2",
          {
            scale: 10,
            x: -2500,
          },
          "start",
        )
        .to(
          "#scaleableImg3",
          {
            scale: 10,
            x: -2000,
          },
          "start",
        )
        .to(
          "#scaleableImg4",
          {
            scale: 10,
            x: 3000,
          },
          "start",
        )
        .to(
          "#scaleableImg5",
          {
            scale: 10,
            x: 2000,
          },
          "start",
        )
        .to(
          ".cardImage",
          {
            delay: 0.1,
            scale: 5,
          },
          "start",
        )
        .to(
          ".cardImage",
          {
            delay: 0.4,
            opacity: 1,
          },
          "start",
        )
        .to(".scaleableImg", {
          opacity: 0,
        });
    </script>
  </body>
</html>
