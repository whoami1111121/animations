<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cards Stacking with GSAP</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />

    <link href="main.css" rel="stylesheet" type="text/css" />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #eeeeee;
        color: #292929;
        font-family: sans-serif;
        font-size: 1rem;
        line-height: 1.5;
        transition:
          color 0.3s,
          background-color 0.3s;
      }

      h2 {
        margin-top: 0;
        margin-bottom: 1rem;
        font-size: 2rem;
        font-weight: 700;
        line-height: 1.2;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div>
      <div class="w-40 h-40 bg-red-900 b1">a</div>
      <div class="w-40 h-40 bg-red-900 b2">b</div>
      <div class="w-40 h-40 bg-red-900 b3">d</div>
      <div class="h-screen"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
    <script>
      // Make ScrollTrigger available for use in GSAP animations
      //   gsap.registerPlugin(ScrollTrigger);
      const tl = gsap.timeline({
        defaults: { duration: 2 },
        yoyo: true,
        repeat: -1,
      });
      tl.to(".b1", { x: 1100 });
      tl.to(".b2", { x: 1100 });
      tl.to(".b3", { x: 1100 });
    </script>
    <!-- <script src="https://cdn.jsdelivr.net/gh/YT-PixelPerfectLabs/Youtube-Floating-Button/dist/script.js"></script> -->
  </body>
</html>
