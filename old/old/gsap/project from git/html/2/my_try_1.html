<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .box {
        overflow-x: hidden;
      }
      h1 {
        font-size: 12vw;
        margin: 0;
        line-height: 24vh;
        padding: 0;
      }
      h1 .text-red-900 {
        -webkit-text-stroke: 1px #fff;
        color: transparent;
      }
    </style>
  </head>
  <body class="bg-black text-white">
    <div class="h-screen border-b border-b"></div>

    <div class="w-full box py-30 flex flex-col -gap-40">
      <h1 class="text-[100px] font-bold whitespace-nowrap">
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
      </h1>
      <h1 class="text-[100px] font-bold whitespace-nowrap">
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
      </h1>
      <h1 class="text-[100px] font-bold whitespace-nowrap">
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
      </h1>
      <h1 class="text-[100px] font-bold whitespace-nowrap">
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
      </h1>
      <h1 class="text-[100px] font-bold whitespace-nowrap">
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
        <span class="text-red-900">ONE</span> <span>ONE</span>
      </h1>
    </div>

    <div class="h-screen border-t"></div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"
      integrity="sha512-16esztaSRplJROstbIIdwX3N97V1+pZvV33ABoG1H2OyTttBxEGkTsoIVsiP1iaTtM8b3+hu2kB6pQ4Clr5yug=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"
      integrity="sha512-Ic9xkERjyZ1xgJ5svx3y0u3xrvfT/uPkV99LBwe68xjy/mGtO+4eURHZBW2xW4SZbFrF1Tf090XqB+EVgXnVjw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script>
      const scrollSection = document.querySelectorAll(".box h1");
      const timeline = gsap.timeline({
        scrollTrigger: {
          trigger: ".box",
          start: "top 100%",
          end: () => `100%`,
          scrub: 1,
          //   invalidateOnRefresh: true,
          markers: true,
        },
        defaults: { ease: "none" },
      });
      scrollSection.forEach((item, index) => {
        gsap.set(item, { x: index % 2 !== 1 ? -450 : 0 });
        timeline.to(
          item,
          {
            x: index % 2 !== 1 ? 0 : -450,
          },
          "<",
        );
      });

      console.log(scrollSection);
    </script>
  </body>
</html>
