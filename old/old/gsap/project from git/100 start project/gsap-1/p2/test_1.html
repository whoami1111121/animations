<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow-x: hidden;
      }
    </style>
  </head>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <body class="bg-black text-white">
    <div class="w-full h-screen relative">
      <div
        class="box w-full h-full flex justify-center items-center text-8xl absolute bg-red-800 top-0 left-0 right-0 right-0"
      >
        hi 1
      </div>
      <div
        class="box w-full h-full flex justify-center items-center text-8xl absolute bg-blue-800 top-0 left-0 right-0 right-0"
      >
        dd 2
      </div>
      <div
        class="box w-full h-full flex justify-center items-center text-8xl absolute bg-pink-800 top-0 left-0 right-0 right-0"
      >
        abcc 3
      </div>
      <button
        id="button"
        class="absolute bottom-20 z-10 left-[50%] translate-x-[-50%] px-8 py-8 h-10 rounded-xl border border-white w-30 cursor-pointer"
      >
        Next
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <script>
      const box = document.getElementsByClassName("box");

      const button = document.getElementById("button");
      let x = 0;
      button.addEventListener("click", () => btnCli());
      const btnCli = () => {
        if (box.length < x) {
          x = 0;
        }
        console.log("tt", x, box[x - 1]);
        gsap.set(".box", { xPercent: 200, scale: 2 });
        gsap.to(box[x], {
          xPercent: 0,
          duration: 2,
          scale: 1,
        });
        gsap.to(box.length, {
          xPercent: -100,
          duration: 2,
          scale: 0.5,
        });
        gsap.to(box[x - 1 == -1 ? box.length : x - 1], {
          xPercent: -100,
          duration: 2,
          scale: 0.5,
        });
        x += 1;
      };
      btnCli();
    </script>
  </body>
</html>
