<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <style>
    .mainBox {
      background-color: pink;
      overflow: hidden;
    }
    .btn {
      cursor: pointer;
      border: 4px solid rgb(5, 0, 26);
      font-size: 24px;
      background-color: white;
      border-radius: 20px;
    }
    .btn:hover {
      border: 4px solid rgb(255, 255, 255);
      background-color: rgb(5, 0, 26);
      color: white;
      transition: 0.4s;
    }
    .t1 {
      font-size: 46px;
      font-weight: bold;
      color: white;
    }
    .t2 {
      font-size: 32px;
      font-weight: 600;
      color: white;
    }
  </style>
  <body class="h-screen w-full bg-black text-white" style="overflow-x: hidden">
    <div class="px-24 py-4 flex justify-between item-center">
      <h1 class="text-2xl font-bold">nav bar</h1>
      <div class="flex gap-16 text-md font-semibold">
        <h2>Home</h2>
        <h2>About</h2>
        <h2>Contact</h2>
        <h2>Service</h2>
      </div>
    </div>
    <div class="w-full h-screen">
      <div class="flex">
        <div class="flex-1 relative mainBox">
          <img
            src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fGNhdHxlbnwwfHwwfHx8MA%3D%3D"
            alt="g2"
            class="w-full h-full"
          />
          <div class="absolute w-full h-full top-0 left-0 z-1">
            <div class="flex flex-col justify-center item-center w-full h-full">
              <div class="text-center" style="color: rgb(5, 0, 26)">
                <button class="px-8 py-3 font-bold btn" style="">
                  Watch More >>
                </button>
                <h1 class="t1">Simple</h1>
                <h2 class="t2">FASHION</h2>
              </div>
            </div>
          </div>
        </div>
        <div class="flex-1 relative mainBox">
          <img
            src="https://images.unsplash.com/photo-1503256207526-0d5d80fa2f47?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8ZG9nfGVufDB8fDB8fHww"
            alt="g1"
            class="w-full h-full"
          />
          <div class="absolute w-full h-full top-0 left-0 z-1">
            <div class="flex flex-col justify-center item-center w-full h-full">
              <div class="text-center" style="color: rgb(5, 0, 26)">
                <button class="px-8 py-3 font-bold btn" style="">
                  Watch More >>
                </button>
                <h1 class="t1">Simple</h1>
                <h2 class="t2">FASHION</h2>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
      integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"
      integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script>
      let tl = gsap.timeline();
      tl.from(".mainBox", {
        stagger: 1,
        y: -1000,
        opacity: 0,
        duration: 2,
      });
      tl.from(
        ".mainBox img",
        {
          scale: 1.3,
          opacity: 0,
          duration: 2,
          stagger: 2,
        },
        "-=1.7",
      );
      tl.from(
        ".mainBox .absolute",
        {
          y: 200,
          opacity: 0,
          duration: 2,
          stagger: 1,
        },
        "-=0.7",
      );
    </script>
  </body>
</html>
