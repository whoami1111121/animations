  <style>
    .ham {
      position: relative;
      color: blue;
      z-index: 2;
      display: inline-block;
      cursor: pointer;
    }
    .ham::after {
      border-radius: 100%;
      content: "";
      background-color: red;
      width: 0;
      height: 0;
      opacity: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: -1;
      transition: all ease 0.5s;
      transform: translate(-50%, -35%);
    }
    .ham:hover::after {
      width: 100px;
      height: 100px;
      opacity: 1;
    }
    .menu ul li a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      position: relative;
    }
    .menu ul li a:before {
      content: "";
      position: absolute;
      top: 50%;
      left: -10%;
      width: 0%;
      height: 2px;
      background-color: white;
      transition: all ease 0.5s;
    }
  </style>
  <body class="h-screen w-full bg-black text-white" style="overflow-x: hidden">
    <div>
      <h1>ready</h1>

        </div>
      </div>
    </div>
