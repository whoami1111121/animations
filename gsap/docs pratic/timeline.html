<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      /* Global styles come from external css https://codepen.io/GreenSock/pen/xxmzBrw */

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        min-height: 100vh;
        gap: 1rem;
      }

      .box {
        display: block;
      }

      .green,
      .orange,
      .purple {
        background-color: pink;
        width: 100px;
        height: 100px;
      }
    </style>
  </head>
  <body class="bg-black text-white">
    <div>
      <div class="box box1 green"></div>
      <div class="box box2 orange"></div>
      <div class="box box3 purple"></div>
    </div>
    <br />
    <br />

    <div class="nav light">
      <button id="play">play()</button>
      <button id="pause">pause()</button>
      <button id="resume">resume()</button>
      <button id="reverse">reverse()</button>
      <button id="restart">restart()</button>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
      integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script>
      //tweens are inserted at and relative to a label's position
      let tl = gsap.timeline();
      let tween = tl
        .to(".green", { duration: 1, x: 822 })
        //add blueSpin label 1 second after end of timeline
        .add("blueSpin", "+=1")
        //add tween at blueSpin label
        .to(".blue", { duration: 1, x: 822, rotation: 360 }, "blueSpin")
        //insert tween 0.5 seconds after blueSpin label
        .to(".orange", { duration: 1, x: 822, rotation: 360 }, "blueSpin+=0.5");

      // click handlers for controlling the tween instance...
      document.querySelector("#play").onclick = () => tween.play();
      document.querySelector("#pause").onclick = () => tween.pause();
      document.querySelector("#resume").onclick = () => tween.resume();
      document.querySelector("#reverse").onclick = () => tween.reverse();
      document.querySelector("#restart").onclick = () => tween.restart();
    </script>
  </body>
</html>
