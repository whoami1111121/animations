<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .vertical-section {
        height: 500vh;
        width: 100;
      }
      .list {
        width: 100%;
        height: 100vh;
        position: relative;
      }
      .item_media {
        object-fit: cover;
        width: 50%;
        height: 100%;
      }
      .item1,
      .item2,
      .item3,
      .item4 {
        position: absolute;
        inset: 0;
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-black text-white">
    <div>
      <div class="flex items-center justify-center py-60 bg-blue-900">
        <h1>main content</h1>
      </div>

      <div class="vertical-section">
        <div class="list">
          <div class="item2 bg-blue-900 text-white flex">
            <div class="item_content flex-1">
              <div class="p-20">
                <h1>1</h1>
                <h1>the quick brown fox jumps over the lazy dog.</h1>
              </div>
            </div>

            <video
              src="https://videos.pexels.com/video-files/4763824/4763824-uhd_2560_1440_24fps.mp4"
              loading="lazy"
              autoplay
              muted
              loop
              class="item_media"
            ></video>
          </div>
          <div class="item2 bg-blue-900 text-white flex">
            <div class="item_content flex-1">
              <div class="p-20">
                <h1>2</h1>
                <h1>the quick brown fox jumps over the lazy dog.</h1>
              </div>
            </div>

            <video
              src="https://videos.pexels.com/video-files/3214448/3214448-uhd_2560_1440_25fps.mp4"
              loading="lazy"
              autoplay
              muted
              loop
              class="item_media"
            ></video>
          </div>
          <div class="item3 bg-blue-900 text-white flex">
            <div class="item_content flex-1">
              <div class="p-20">
                <h1>3</h1>
                <h1>the quick brown fox jumps over the lazy dog.</h1>
              </div>
            </div>

            <video
              src="https://videos.pexels.com/video-files/4328514/4328514-uhd_2560_1440_30fps.mp4"
              loading="lazy"
              autoplay
              muted
              loop
              class="item_media"
            ></video>
          </div>
          <div class="item4 bg-blue-900 text-white flex">
            <div class="item_content flex-1">
              <div class="p-20">
                <h1>4</h1>
                <h1>the quick brown fox jumps over the lazy dog.</h1>
              </div>
            </div>

            <video
              src="https://videos.pexels.com/video-files/4763824/4763824-uhd_2560_1440_24fps.mp4"
              loading="lazy"
              autoplay
              muted
              loop
              class="item_media"
            ></video>
          </div>
        </div>
      </div>
    </div>
    <div class="w-full h-screen block bg-pink-900"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <script>
      gsap.registerPlugin(ScrollTrigger);

      gsap.set(".item1", { yPercent: -100 });
      gsap.set(".item2", { yPercent: 100 });
      gsap.set(".item3", { yPercent: 200 });
      gsap.set(".item4", { yPercent: 300 });
      const timeline = gsap.timeline();
      timeline.to(".item1", {
        scale: 0.9,
        borderRadius: "10px",
        scrollTrigger: {
          trigger: ".item1",
          pin: true,
          start: "top top",
          end: () => `+=${0 * 100}%`,
          scrub: 1,
          invalidateOnRefresh: true,
          markers: true,
        },
        defaults: { ease: "none" },
      });
      timeline.to(
        ".items1",
        {
          yPercent: 0,
        },
        "<",
      );
      timeline.to(".item2", {
        scale: 0.9,
        borderRadius: "10px",
        scrollTrigger: {
          trigger: ".item2",
          pin: true,
          start: "top top",
          end: () => `+=${1 * 100}%`,
          scrub: 1,
          invalidateOnRefresh: true,
          markers: true,
        },
        defaults: { ease: "none" },
      });
      timeline.to(
        ".items2",
        {
          yPercent: 0,
        },
        "<",
      );
      timeline.to(".item3", {
        scale: 0.9,
        borderRadius: "10px",
        scrollTrigger: {
          trigger: ".item3",
          pin: true,
          start: "top top",
          end: () => `+=${2 * 100}%`,
          scrub: 1,
          invalidateOnRefresh: true,
          markers: true,
        },
        defaults: { ease: "none" },
      });
      timeline.to(
        ".items3",
        {
          yPercent: 0,
        },
        "<",
      );
      timeline.to(".item4", {
        scale: 0.9,
        borderRadius: "10px",
        scrollTrigger: {
          trigger: ".item4",
          pin: true,
          start: "top top",
          end: () => `+=${3 * 100}%`,
          scrub: 1,
          invalidateOnRefresh: true,
          markers: true,
        },
        defaults: { ease: "none" },
      });
      timeline.to(
        ".items4",
        {
          yPercent: 0,
        },
        "<",
      );
    </script>
  </body>
</html>
