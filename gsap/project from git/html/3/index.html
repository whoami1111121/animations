      .hamburger a {
        padding: 0;
        width: 37px;
        height: 37px;
        display: flex;
        border-radius: 50%;
        background-color: rgba(115, 115, 115, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        justify-content: center;
        align-items: center;
      }

      .hamburger .bar {
        position: relative;
        margin: 20%;
        width: 52px;
        height: 1.3px;
        background-color: #fff;
        border-radius: 2px;
      }

      .hamburger .bar::before,
      .hamburger .bar::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 60%;
        height: 100%;
        background-color: inherit;
        border-radius: 2px;
      }

      .hamburger .bar::before {
        top: -4.5px;
      }
      .hamburger .bar::after {
        top: 4.5px;
      }

      /* adding before and after elements to an element actually gives it a before rendering and after rendering style */

    <script>
      const parallex_el = document.querySelectorAll(".parallex");
      console.log(parallex_el, "--parallex_el");

      let xValue = 0,
        yValue = 0;
      let x_per = 0,
        y_per = 0;

      window.addEventListener("mousemove", (e) => {
        xValue = e.clientX - window.innerWidth / 2;
        yValue = e.clientY - window.innerHeight / 2;
        console.log(xValue, yValue);

        parallex_el.forEach((el) => {
          let speedx = el.dataset.speedx;
          y_per =
            -50 + ((-yValue * (speedx - 0.03)) / window.innerHeight) * 100;
          x_per = -50 + ((-xValue * (speedx - 0.02)) / window.innerWidth) * 100;

          el.style.transform = "translate(" + x_per + "%," + y_per + "%)";
        });
      });
