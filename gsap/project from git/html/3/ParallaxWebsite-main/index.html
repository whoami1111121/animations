<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>Parallex website</title>
  </head>
  <body>
    <header>
      <nav>
        <img src="img/logo.png" class="logo" />
        <ul>
          <li><a href="../ParallaxWebsite/signup.html">Login</a></li>
          <li><a href="../ParallaxWebsite/signup.html">Sign Up</a></li>
          <li class="search">
            <a href="">
              <i class="fa-solid fa-magnifying-glass"></i>
            </a>
          </li>
          <li class="hamburger">
            <a href="">
              <div class="bar"></div>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- main -->
    <main>
      <div class="vignette"></div>
      <img src="img/background.png" data-speedx="0.3" class="parallex bg-img" />
      <img src="img/fog_7.png" data-speedx="0.27" class="parallex fog-7" />
      <img
        src="img/mountain_10.png"
        data-speedx="0.195"
        class="parallex mountain-10"
      />
      <img src="img/fog_6.png" data-speedx="0.25" class="parallex fog-6" />
      <img
        src="img/mountain_9.png"
        data-speedx="0.125"
        class="parallex mountain-9"
      />
      <img
        src="img/mountain_8.png"
        data-speedx="0.1"
        class="parallex mountain-8"
      />
      <img src="img/fog_5.png" data-speedx="0.16" class="parallex fog-5" />
      <img
        src="img/mountain_7.png"
        data-speedx="0.1"
        class="parallex mountain-7"
      />
      <div class="text parallex" data-speedx="0.07">
        <h2>Parallax</h2>
        <h1>Website</h1>
      </div>
      <img
        src="img/mountain_6.png"
        data-speedx="0.065"
        class="parallex mountain-6"
      />
      <img src="img/fog_4.png" data-speedx="0.135" class="parallex fog-4" />
      <img
        src="img/mountain_5.png"
        data-speedx="0.008"
        class="parallex mountain-5"
      />
      <img src="img/fog_3.png" data-speedx="0.11" class="parallex fog-3" />
      <img
        src="img/mountain_4.png"
        data-speedx="0.059"
        class="parallex mountain-4"
      />
      <img
        src="img/mountain_3.png"
        data-speedx="0.04"
        class="parallex mountain-3"
      />
      <img src="img/fog_2.png" data-speedx="0.15" class="parallex fog-2" />
      <img
        src="img/mountain_2.png"
        data-speedx="0.0235"
        class="parallex mountain-2"
      />
      <img
        src="img/mountain_1.png"
        data-speedx="0.027"
        class="parallex mountain-1"
      />
      <img src="img/sun_rays.png" class="sun-rays" />
      <img src="img/black_shadow.png" class="black-shadow" />
      <img src="img/fog_1.png" data-speedx="0.12" class="parallex fog-1" />
    </main>
    <script src="js/app.js"></script>
    <script src="new.js"></script>
  </body>
</html>
