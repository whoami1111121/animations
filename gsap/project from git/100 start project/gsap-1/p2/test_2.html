<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow-x: hidden;
        background-color: black;
        color: white;
      }
      .main {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      .box {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
      .b1 {
        background-color: red;
      }
      .b2 {
        background-color: blue;
      }
      .b3 {
        background-color: palevioletred;
      }
      #button {
        position: absolute;
        bottom: 40px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="box b1">hi 1</div>
      <div class="box b2">dd 2</div>
      <div class="box b3">abcc 3</div>
      <button id="button">Next</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <script>
      const box = document.querySelectorAll(".box");

      const button = document.getElementById("button");
      let x = 0;
      button.addEventListener("click", () => btnCli());
      box.forEach((item, index) => {
        console.log(item, index);
        gsap.set(item, { xPercent: 200, scale: 2 });
        if (index === 0) {
          gsap.set(item, { xPercent: 100, scale: 1 });
        }
        if (box.length - 1 == index) {
          gsap.set(item, { xPercent: 0, scale: 1 });
        }
      });
      gsap.to(box[box.length - 1], {
        duration: 1,
        xPercent: -100,
        scale: 0.5,
      });
      gsap.to(
        box[0],
        {
          xPercent: 0,
          duration: 1,
          scale: 1,
        },
        "-=1",
      );

      const btnCli = () => {
        if (box.length < x) {
          x = 0;
        }
        console.log("tt", x, box[x - 1]);

        gsap.to(box.length, {
          xPercent: -100,
          duration: 2,
          scale: 0.5,
        });
        gsap.to(box[x - 1 == -1 ? box.length : x - 1], {
          xPercent: -100,
          duration: 2,
          scale: 0.5,
        });
        x += 1;
      };
      // btnCli();
    </script>
  </body>
</html>
